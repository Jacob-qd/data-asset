<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Background -->
  <rect x="50" y="40" width="300" height="220" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <!-- Sandbox container -->
  <rect x="120" y="80" width="160" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <path d="M120 110 L280 110" stroke="#E2E8F0"/>
  <!-- Sand particles -->
  <circle cx="150" cy="145" r="12" fill="#FEF3C7" stroke="#F59E0B" opacity="0.8"/>
  <circle cx="180" cy="165" r="10" fill="#DBEAFE" stroke="#3B82F6" opacity="0.8"/>
  <circle cx="210" cy="140" r="11" fill="#E0E7FF" stroke="#6366F1" opacity="0.8"/>
  <circle cx="240" cy="170" r="9" fill="#D1FAE5" stroke="#10B981" opacity="0.8"/>
  <circle cx="170" cy="185" r="8" fill="#FCE7F3" stroke="#EC4899" opacity="0.6"/>
  <circle cx="225" cy="185" r="7" fill="#FEF3C7" stroke="#F59E0B" opacity="0.6"/>
  <!-- Shield / protection -->
  <path d="M200 60 L200 75" stroke="#6366F1" stroke-width="2"/>
  <path d="M185 68 Q200 55 215 68" stroke="#6366F1" stroke-width="2" fill="#EEF2FF"/>
  <!-- Data flow arrows -->
  <path d="M90 130 L115 140" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M90 170 L115 160" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M310 130 L285 140" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M310 170 L285 160" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#94A3B8"/>
    </marker>
  </defs>
  <!-- Lock icon -->
  <rect x="190" y="92" width="20" height="14" rx="3" fill="#EEF2FF" stroke="#6366F1"/>
  <circle cx="200" cy="90" r="5" fill="none" stroke="#6366F1"/>
  <!-- Decorative -->
  <circle cx="80" cy="70" r="5" fill="#6366F1" opacity="0.2"/>
  <circle cx="320" cy="80" r="5" fill="#10B981" opacity="0.2"/>
  <circle cx="75" cy="220" r="5" fill="#F59E0B" opacity="0.2"/>
  <circle cx="325" cy="210" r="5" fill="#3B82F6" opacity="0.2"/>
</svg>
