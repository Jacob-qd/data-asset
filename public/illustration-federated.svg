<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Background -->
  <rect x="50" y="40" width="300" height="220" rx="12" fill="#0B1120" stroke="#1E293B"/>
  <!-- Central server node -->
  <circle cx="200" cy="150" r="30" fill="#1E293B" stroke="#6366F1" stroke-width="2"/>
  <rect x="185" y="138" width="30" height="24" rx="3" fill="#273548" stroke="#6366F1"/>
  <line x1="192" y1="145" x2="208" y2="145" stroke="#6366F1" stroke-width="1"/>
  <line x1="192" y1="151" x2="204" y2="151" stroke="#6366F1" stroke-width="1"/>
  <!-- Node 1 - top left -->
  <circle cx="130" cy="90" r="25" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
  <rect x="118" y="80" width="24" height="20" rx="3" fill="#273548" stroke="#3B82F6"/>
  <line x1="155" y1="100" x2="173" y2="126" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <!-- Node 2 - top right -->
  <circle cx="270" cy="90" r="25" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
  <rect x="258" y="80" width="24" height="20" rx="3" fill="#273548" stroke="#10B981"/>
  <line x1="245" y1="100" x2="227" y2="126" stroke="#10B981" stroke-width="1" opacity="0.6"/>
  <!-- Node 3 - bottom left -->
  <circle cx="130" cy="210" r="25" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <rect x="118" y="200" width="24" height="20" rx="3" fill="#273548" stroke="#F59E0B"/>
  <line x1="155" y1="200" x2="173" y2="174" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
  <!-- Node 4 - bottom right -->
  <circle cx="270" cy="210" r="25" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
  <rect x="258" y="200" width="24" height="20" rx="3" fill="#273548" stroke="#EC4899"/>
  <line x1="245" y1="200" x2="227" y2="174" stroke="#EC4899" stroke-width="1" opacity="0.6"/>
  <!-- Connection lines between outer nodes -->
  <line x1="155" y1="90" x2="245" y2="90" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="130" y1="115" x2="130" y2="185" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="270" y1="115" x2="270" y2="185" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="155" y1="210" x2="245" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Decorative elements -->
  <circle cx="85" cy="70" r="4" fill="#3B82F6" opacity="0.3"/>
  <circle cx="315" cy="80" r="4" fill="#10B981" opacity="0.3"/>
  <circle cx="80" cy="230" r="4" fill="#F59E0B" opacity="0.3"/>
  <circle cx="320" cy="220" r="4" fill="#EC4899" opacity="0.3"/>
</svg>
